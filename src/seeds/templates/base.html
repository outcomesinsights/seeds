<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}seeds{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <!-- Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --pico-font-size: 16px;
        }
        .seed-status {
            display: inline-block;
            padding: 0.2em 0.5em;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: 500;
        }
        .status-captured { background: #e3f2fd; color: #1565c0; }
        .status-exploring { background: #fff3e0; color: #ef6c00; }
        .status-deferred { background: #f3e5f5; color: #7b1fa2; }
        .status-resolved { background: #e8f5e9; color: #2e7d32; }
        .status-abandoned { background: #ffebee; color: #c62828; }

        .seed-type {
            display: inline-block;
            padding: 0.2em 0.5em;
            border-radius: 4px;
            font-size: 0.85em;
            background: #f5f5f5;
            color: #616161;
        }

        .tag {
            display: inline-block;
            padding: 0.15em 0.4em;
            border-radius: 3px;
            font-size: 0.8em;
            background: #e0e0e0;
            color: #424242;
            margin-right: 0.3em;
            text-decoration: none;
        }

        a.tag:hover {
            background: #bdbdbd;
            color: #212121;
        }

        .question-status-open { color: #ef6c00; }
        .question-status-answered { color: #2e7d32; }
        .question-status-deferred { color: #7b1fa2; }

        .seed-content {
            font-family: inherit;
            background: #fafafa;
            padding: 1em;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
        }

        /* When seed-content has markdown rendered, remove pre-wrap */
        .seed-content.markdown-content {
            white-space: normal;
        }

        /* Tighter spacing for markdown in seed content */
        .seed-content.markdown-content p,
        .seed-content.markdown-content ul,
        .seed-content.markdown-content ol,
        .seed-content.markdown-content li,
        .seed-content.markdown-content h1,
        .seed-content.markdown-content h2,
        .seed-content.markdown-content h3,
        .seed-content.markdown-content h4,
        .seed-content.markdown-content h5,
        .seed-content.markdown-content h6,
        .seed-content.markdown-content pre,
        .seed-content.markdown-content blockquote {
            margin-top: 0.25em !important;
            margin-bottom: 0.25em !important;
            --pico-typography-spacing-vertical: 0 !important;
        }

        .seed-content.markdown-content > *:first-child {
            margin-top: 0 !important;
        }

        .seed-content.markdown-content > *:last-child {
            margin-bottom: 0 !important;
        }

        .seed-content.markdown-content li {
            margin-bottom: 0.1em !important;
        }

        .meta {
            color: #757575;
            font-size: 0.9em;
        }

        nav ul {
            margin-bottom: 0;
        }

        .truncate {
            max-width: 400px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Nested view indentation - use inline display to prevent wrapping */
        .nested-row td:first-child > span {
            display: inline-block;
            white-space: nowrap;
        }

        .depth-0 { padding-left: 0; }
        .depth-1 { padding-left: 1.2em; }
        .depth-2 { padding-left: 2.4em; }
        .depth-3 { padding-left: 3.6em; }
        .depth-4 { padding-left: 4.8em; }
        .depth-5 { padding-left: 6em; }
        .depth-6 { padding-left: 7.2em; }

        .nested-row td:first-child {
            position: relative;
        }

        .child-indicator {
            color: #9e9e9e;
            margin-right: 0.2em;
        }

        /* Subtle highlighting for child rows to show grouping */
        tr.nested-row[data-depth="1"],
        tr.nested-row[data-depth="1"] td { background-color: #f5f5f5 !important; }
        tr.nested-row[data-depth="2"],
        tr.nested-row[data-depth="2"] td { background-color: #eeeeee !important; }
        tr.nested-row[data-depth="3"],
        tr.nested-row[data-depth="3"] td { background-color: #e8e8e8 !important; }
        tr.nested-row[data-depth="4"],
        tr.nested-row[data-depth="4"] td { background-color: #e0e0e0 !important; }
        tr.nested-row[data-depth="5"],
        tr.nested-row[data-depth="5"] td { background-color: #d8d8d8 !important; }
        tr.nested-row[data-depth="6"],
        tr.nested-row[data-depth="6"] td { background-color: #d0d0d0 !important; }

        /* Filter controls */
        .filter-controls {
            display: flex;
            gap: 1em;
            flex-wrap: wrap;
            margin-bottom: 1em;
            align-items: center;
        }

        .filter-controls input,
        .filter-controls select {
            margin-bottom: 0;
            width: auto;
            min-width: 120px;
        }

        .filter-controls label {
            display: flex;
            align-items: center;
            gap: 0.5em;
            margin-bottom: 0;
        }

        /* Sortable headers */
        th.sortable {
            cursor: pointer;
            user-select: none;
        }

        th.sortable:hover {
            background: #f5f5f5;
        }

        th.sort-asc::after {
            content: " ▲";
            font-size: 0.7em;
        }

        th.sort-desc::after {
            content: " ▼";
            font-size: 0.7em;
        }

        /* View toggle */
        .view-toggle {
            display: inline-flex;
            border: 1px solid #ccc;
            border-radius: 4px;
            overflow: hidden;
        }

        .view-toggle button {
            margin: 0;
            border: none;
            border-radius: 0;
            padding: 0.3em 0.8em;
            background: #f5f5f5;
            cursor: pointer;
        }

        .view-toggle button.active {
            background: #1976d2;
            color: white;
        }

        .view-toggle button:not(:last-child) {
            border-right: 1px solid #ccc;
        }

        /* Markdown rendered content - override Pico defaults for tighter spacing */
        .markdown-content {
            line-height: 1.4;
        }

        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3,
        .markdown-content h4,
        .markdown-content h5,
        .markdown-content h6 {
            margin-top: 0.75em;
            margin-bottom: 0.25em;
            --pico-typography-spacing-vertical: 0;
        }

        .markdown-content h1:first-child,
        .markdown-content h2:first-child,
        .markdown-content h3:first-child,
        .markdown-content h4:first-child {
            margin-top: 0;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin: 0.25em 0;
            padding-left: 1.5em;
            --pico-typography-spacing-vertical: 0;
        }

        .markdown-content li {
            margin-bottom: 0.1em;
            --pico-typography-spacing-vertical: 0;
        }

        .markdown-content li:last-child {
            margin-bottom: 0;
        }

        .markdown-content p {
            margin: 0.25em 0;
            --pico-typography-spacing-vertical: 0;
        }

        .markdown-content p:first-child {
            margin-top: 0;
        }

        .markdown-content p:last-child {
            margin-bottom: 0;
        }

        .markdown-content code {
            background: #f5f5f5;
            padding: 0.1em 0.3em;
            border-radius: 3px;
            font-size: 0.9em;
        }

        .markdown-content pre {
            background: #f5f5f5;
            padding: 0.75em;
            border-radius: 4px;
            overflow-x: auto;
            margin: 0.5em 0;
            --pico-typography-spacing-vertical: 0;
        }

        .markdown-content pre code {
            background: none;
            padding: 0;
        }

        /* ID column - prevent wrapping, expand as needed */
        table td:first-child,
        table th:first-child {
            white-space: nowrap;
        }

        .nested-row td:first-child a,
        .nested-row td:first-child span {
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <nav class="container">
        <ul>
            <li><strong>seeds</strong></li>
        </ul>
        <ul>
            <li><a href="/">All Seeds</a></li>
            <li><a href="/questions">Open Questions</a></li>
        </ul>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="container">
        <small class="meta">seeds - deliberation capture tool</small>
    </footer>

    <script>
    /**
     * Prettify markdown text to fix common LLM formatting issues.
     * Does NOT modify original content - only for display.
     */
    function prettifyMarkdown(text) {
        if (!text) return '';

        let result = text;

        // Ensure blank line before headers (# ## ### etc.)
        result = result.replace(/([^\n])\n(#{1,6}\s)/g, '$1\n\n$2');

        // Ensure blank line after headers
        result = result.replace(/(#{1,6}\s[^\n]+)\n([^\n#])/g, '$1\n\n$2');

        // Ensure blank line before lists (- or * or numbered)
        result = result.replace(/([^\n])\n([-*]\s|\d+\.\s)/g, '$1\n\n$2');

        // Ensure blank line before code blocks
        result = result.replace(/([^\n])\n(```)/g, '$1\n\n$2');

        // Ensure blank line after code blocks
        result = result.replace(/(```)\n([^\n`])/g, '$1\n\n$2');

        // Normalize multiple blank lines to max two
        result = result.replace(/\n{3,}/g, '\n\n');

        // Trim leading/trailing whitespace
        result = result.trim();

        return result;
    }

    /**
     * Render markdown content in elements with data-markdown attribute.
     */
    function renderMarkdown() {
        document.querySelectorAll('[data-markdown]').forEach(el => {
            const raw = el.textContent || el.getAttribute('data-markdown');
            const prettified = prettifyMarkdown(raw);
            el.innerHTML = marked.parse(prettified);
            el.classList.add('markdown-content');
        });
    }

    // Run on page load
    document.addEventListener('DOMContentLoaded', renderMarkdown);
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
